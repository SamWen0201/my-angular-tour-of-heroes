@if (selectedHero) {
<h2>{{ selectedHero.name | uppercase }} Details</h2>
<div>
  <span>id: </span>
  {{ selectedHero.id }}
</div>
<div>
  <label for="name">selectedHero name: </label>
  <input
    id="name"
    type="text"
    [(ngModel)]="selectedHero.name"
    placeholder="name"
  />
</div>
}

<!-- <p>{{ heroes.length }}</p> -->

<h2>My Heroes</h2>
<ul class="heroes">
  @for(hero of heroes; track hero.name){
  <li>
    <button
      type="button"
      (click)="onSelect(hero)"
      [class.selected]="hero === selectedHero"
    >
      <span class="badge">{{ hero.id }}</span>
      <span class="name">{{ hero.name }}</span>
    </button>
  </li>
  }
</ul>
